<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0c10"/>
  <!-- Subtle radial glow -->
  <radialGradient id="g1" cx="40%" cy="45%" r="55%" xmlns="http://www.w3.org/2000/svg">
    <stop offset="0%" stop-color="#161820"/>
    <stop offset="100%" stop-color="#0a0c10"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.6" fill="rgba(240,235,228,0.035)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#d4a853" opacity="0.4"/>
  <!-- Brand label -->
  <text x="100" y="195" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#7d9b8a" letter-spacing="4" font-weight="400">SUPERTHOUGHTS</text>
  <!-- Amber dash -->
  <rect x="100" y="215" width="50" height="2" rx="1" fill="#d4a853" opacity="0.7"/>
  <!-- Title -->
  <text x="100" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="#f0ebe4" font-weight="400">Deep Sleep</text>
  <!-- Subtitle line 1 -->
  <text x="100" y="345" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#a09994" font-weight="300">An 8-session guided sleep program</text>
  <!-- Subtitle line 2 -->
  <text x="100" y="378" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#a09994" font-weight="300">grounded in clinical research.</text>
  <!-- Stats row -->
  <text x="100" y="460" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#d4a853" letter-spacing="1.5" font-weight="500">39,000+ SESSIONS GUIDED</text>
  <circle cx="345" cy="456" r="2" fill="#5c5651"/>
  <text x="365" y="460" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#7d9b8a" letter-spacing="1.5" font-weight="500">4.8 / 5 RATING</text>
  <circle cx="545" cy="456" r="2" fill="#5c5651"/>
  <text x="565" y="460" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#b8929a" letter-spacing="1.5" font-weight="500">$49 ONE-TIME</text>
  <!-- CTA box -->
  <rect x="100" y="500" width="260" height="44" rx="3" fill="none" stroke="#d4a853" stroke-width="1.2" opacity="0.6"/>
  <text x="140" y="528" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#d4a853" letter-spacing="2.5" font-weight="500">FREE SESSION INSIDE</text>
  <!-- Right side decorative orb -->
  <circle cx="950" cy="315" r="140" fill="none" stroke="rgba(212,168,83,0.06)" stroke-width="1"/>
  <circle cx="950" cy="315" r="100" fill="none" stroke="rgba(212,168,83,0.04)" stroke-width="1"/>
  <circle cx="950" cy="315" r="60" fill="none" stroke="rgba(212,168,83,0.03)" stroke-width="1"/>
  <circle cx="950" cy="315" r="8" fill="rgba(212,168,83,0.12)"/>
  <!-- Bottom accent -->
  <rect x="0" y="625" width="1200" height="5" fill="#d4a853" opacity="0.2"/>
</svg>
