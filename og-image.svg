<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c10"/>
  <radialGradient id="g1" cx="35%" cy="40%" r="65%">
    <stop offset="0%" stop-color="#14161c"/>
    <stop offset="100%" stop-color="#0a0c10"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1" fill="#f0ebe4" opacity="0.3"/>
  <circle cx="340" cy="45" r="0.8" fill="#f0ebe4" opacity="0.25"/>
  <circle cx="520" cy="110" r="1.2" fill="#f0ebe4" opacity="0.2"/>
  <circle cx="680" cy="55" r="0.7" fill="#f0ebe4" opacity="0.35"/>
  <circle cx="810" cy="90" r="1" fill="#f0ebe4" opacity="0.2"/>
  <circle cx="950" cy="40" r="0.9" fill="#f0ebe4" opacity="0.3"/>
  <circle cx="1080" cy="75" r="1.1" fill="#f0ebe4" opacity="0.15"/>
  <circle cx="200" cy="160" r="0.6" fill="#f0ebe4" opacity="0.2"/>
  <circle cx="450" cy="180" r="0.8" fill="#f0ebe4" opacity="0.15"/>
  <circle cx="750" cy="150" r="0.7" fill="#f0ebe4" opacity="0.25"/>
  <circle cx="1000" cy="170" r="0.9" fill="#f0ebe4" opacity="0.2"/>
  <circle cx="1150" cy="130" r="0.6" fill="#f0ebe4" opacity="0.3"/>
  <circle cx="60" cy="250" r="0.8" fill="#f0ebe4" opacity="0.15"/>
  <circle cx="300" cy="400" r="0.7" fill="#f0ebe4" opacity="0.1"/>
  <circle cx="150" cy="500" r="0.9" fill="#f0ebe4" opacity="0.12"/>
  <circle cx="500" cy="550" r="0.6" fill="#f0ebe4" opacity="0.15"/>
  <circle cx="700" cy="500" r="1" fill="#f0ebe4" opacity="0.1"/>
  <circle cx="900" cy="560" r="0.7" fill="#f0ebe4" opacity="0.18"/>
  <circle cx="1100" cy="520" r="0.8" fill="#f0ebe4" opacity="0.12"/>
  <circle cx="1050" cy="300" r="0.6" fill="#f0ebe4" opacity="0.15"/>
  <circle cx="850" cy="380" r="0.9" fill="#f0ebe4" opacity="0.1"/>
  <circle cx="160" cy="350" r="0.5" fill="#f0ebe4" opacity="0.2"/>
  <circle cx="600" cy="480" r="0.7" fill="#f0ebe4" opacity="0.12"/>
  <circle cx="1130" cy="400" r="0.8" fill="#f0ebe4" opacity="0.1"/>

  <!-- Decorative breathing orb (right side) -->
  <radialGradient id="orb" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="rgba(212,168,83,0.07)"/>
    <stop offset="60%" stop-color="rgba(212,168,83,0.03)"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <circle cx="920" cy="300" r="200" fill="url(#orb)"/>
  <circle cx="920" cy="300" r="120" fill="none" stroke="rgba(212,168,83,0.06)" stroke-width="0.8"/>
  <circle cx="920" cy="300" r="80" fill="none" stroke="rgba(212,168,83,0.04)" stroke-width="0.8"/>
  <circle cx="920" cy="300" r="40" fill="none" stroke="rgba(212,168,83,0.03)" stroke-width="0.8"/>
  <circle cx="920" cy="300" r="6" fill="rgba(212,168,83,0.15)"/>

  <!-- Film grain dots -->
  <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="1" height="1" fill="rgba(240,235,228,0.008)"/>
    <rect x="2" y="2" width="1" height="1" fill="rgba(240,235,228,0.005)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- Brand -->
  <text x="100" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#7d9b8a" letter-spacing="4.5" font-weight="400">SUPERTHOUGHTS</text>

  <!-- Amber accent dash -->
  <rect x="100" y="240" width="45" height="2" rx="1" fill="#d4a853" opacity="0.7"/>

  <!-- Title -->
  <text x="100" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="68" fill="#f0ebe4" font-weight="400" font-style="italic">Deep Sleep</text>

  <!-- Subtitle -->
  <text x="103" y="365" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#a09994" font-weight="300" letter-spacing="0.3">An 8-session guided sleep program</text>
  <text x="103" y="395" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#a09994" font-weight="300" letter-spacing="0.3">grounded in clinical research.</text>

  <!-- Divider line -->
  <line x1="100" y1="430" x2="600" y2="430" stroke="rgba(240,235,228,0.06)" stroke-width="1"/>

  <!-- Stats -->
  <text x="100" y="470" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#d4a853" letter-spacing="1.5" font-weight="500">40,000+ SESSIONS GUIDED</text>
  <circle cx="340" cy="466" r="1.5" fill="#5c5651"/>
  <text x="360" y="470" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#7d9b8a" letter-spacing="1.5" font-weight="500">4.8 / 5 RATING</text>
  <circle cx="530" cy="466" r="1.5" fill="#5c5651"/>
  <text x="550" y="470" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#b8929a" letter-spacing="1.5" font-weight="500">$49 ONE-TIME</text>

  <!-- CTA -->
  <rect x="100" y="500" width="240" height="40" rx="3" fill="none" stroke="#d4a853" stroke-width="1" opacity="0.5"/>
  <text x="138" y="526" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#d4a853" letter-spacing="2.5" font-weight="500">FREE SESSION INSIDE</text>

  <!-- Bottom amber glow line -->
  <linearGradient id="bottomLine" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="20%" stop-color="#d4a853" stop-opacity="0.3"/>
    <stop offset="80%" stop-color="#d4a853" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="transparent"/>
  </linearGradient>
  <rect x="0" y="626" width="1200" height="4" fill="url(#bottomLine)"/>
</svg>
